# Configuracion de Cloudflare Pages (web estatica + Pages Functions en functions/).
# La base D1 hay que crearla una vez con: npx wrangler d1 create copa-arena-db
# y pegar aqui el database_id que devuelve.

# El name debe coincidir con el nombre del proyecto en Cloudflare Pages, y los
# bindings (DB, FOTOS) con las variables que usa el código de functions/.
name = "la-copa-arena"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "copa-arena-db"
database_id = "cd24c895-9353-483e-b2d9-ee000ce7bdbe"
migrations_dir = "db/migrations"

# Fotos de jugadores (privadas, uso interno para stats). Crear una vez con:
# npx wrangler r2 bucket create copa-arena-fotos
[[r2_buckets]]
binding = "FOTOS"
bucket_name = "copa-arena-fotos"
