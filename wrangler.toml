# Cloudflare Pages project config.
# Dashboard/Git integration:
#   Build command: npm run build
#   Build output directory: dist
#   Deploy command: empty
#
# CLI deploy, if needed:
#   npm run build
#   npx wrangler pages deploy dist --project-name web-coparena
#
# Temporary compatibility:
# Some Cloudflare projects still run `npx wrangler versions upload` or
# `npx wrangler deploy` as a custom deploy command. The [assets] block below
# keeps those Worker-style commands from failing while the project is moved to
# the proper Pages deploy flow.

name = "web-coparena"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

[assets]
directory = "./dist"
html_handling = "auto-trailing-slash"

[[d1_databases]]
binding = "DB"
database_name = "copa-arena-db"
database_id = "cd24c895-9353-483e-b2d9-ee000ce7bdbe"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "FOTOS"
bucket_name = "copa-arena-fotos"

# Required secrets/variables in Cloudflare Pages:
# - GOOGLE_CLIENT_ID
# - SESSION_SECRET
# - TURNSTILE_SECRET_KEY
# - GMAIL_CLIENT_ID
# - GMAIL_CLIENT_SECRET
# - GMAIL_REFRESH_TOKEN
