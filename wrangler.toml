# Cloudflare Workers project config.
# Workers Builds:
#   Build command: npm run build
#   Deploy command: npm run deploy:worker
#
# CLI deploy, if needed:
#   npm run deploy

name = "web-coparena"
compatibility_date = "2026-07-01"
main = ".worker/index.js"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "copa-arena-db"
database_id = "cd24c895-9353-483e-b2d9-ee000ce7bdbe"
migrations_dir = "db/migrations"

[[r2_buckets]]
binding = "FOTOS"
bucket_name = "copa-arena-fotos"

# Required secrets/variables in Cloudflare Workers:
# - GOOGLE_CLIENT_ID
# - SESSION_SECRET
# - TURNSTILE_SECRET_KEY
# - GMAIL_CLIENT_ID
# - GMAIL_CLIENT_SECRET
# - GMAIL_REFRESH_TOKEN
